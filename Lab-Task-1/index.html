<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 id="main-title">Student Registration Page</h1>

        <form id="registration-form">

            <div class="form-group">
                <label for="name">Student Name:</label>
                <input type="text" id="name" class="input-field" placeholder="Enter Your Name">
            </div>

            <div class="form-group">
                <label for="cgpa">Student CGPA:</label>
                <input type="text" id="cgpa" class="input-field" placeholder="Enter Your CGPA">
            </div>

            <div class="form-group">
                <label>Gender:</label>
                <input type="radio" name="gender" value="male"> Male
                <input type="radio" name="gender" value="female"> Female
            </div>

            <div class="form-group">
                <label for="department">Select Department:</label>
                <select id="department" class="input-field">
                    <option>CSE</option>
                    <option>BBA</option>
                    <option>EEE</option>
                </select>
            </div>

            <div class="form-group">
                <label for="id">Student ID:</label>
                <input type="text" id="id" class="input-field">
            </div>

            <div class="form-group">
                <label for="address">Address:</label>
                <textarea id="address" class="input-field" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" class="input-field">
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" class="input-field">
            </div>

            <div class="form-group">
                <label for="grade">Upload Grade Report:</label>
                <input type="file" id="grade">
            </div>

            <div class="form-group">
                <input type="checkbox" id="terms">
                <label for="terms">I agree to terms and conditions</label>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" class="input-field">
            </div>

            <button type="submit" class="submit-btn">Submit</button>

        </form>
    </div>

</body>
</html>
